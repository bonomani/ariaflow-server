openapi: 3.0.3
info:
  title: Ariaflow API
  description: |
    Headless download engine API. Manages queue state, sessions, runs,
    and policy on top of aria2.
  version: 0.1.98
  license:
    name: MIT

servers:
  - url: http://127.0.0.1:8000
    description: Local development

tags:
  - name: Meta
    description: API docs, discovery, and test runner
  - name: Observability
    description: Health, events, logs, and session management
  - name: Queue
    description: Queue and item operations
  - name: Scheduler
    description: Run control, preflight, UCC
  - name: Config
    description: Declaration, options, aria2 settings
  - name: aria2
    description: Direct aria2 option management
  - name: Bandwidth
    description: Bandwidth status and probing
  - name: Torrents
    description: Torrent seeding and file management
  - name: Sessions
    description: Session history and statistics
  - name: Lifecycle
    description: Install, uninstall, status





paths:
  /api:
    get:
      tags: [Meta]
      summary: API discovery
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  _request_id:
                    type: string
                  _schema:
                    type: string
                  docs:
                    type: string
                  endpoints:
                    type: object
                  name:
                    type: string
                  openapi:
                    type: string
                  version:
                    type: string
  /api/aria2/change_global_option:
    post:
      tags: [aria2]
      summary: Change aria2 global options (3-tier safety)
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
  /api/aria2/change_option:
    post:
      tags: [aria2]
      summary: Change aria2 per-GID options
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
  /api/aria2/get_global_option:
    get:
      tags: [aria2]
      summary: aria2 global options
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  _request_id:
                    type: string
                  _schema:
                    type: string
  /api/aria2/get_option:
    get:
      tags: [aria2]
      summary: aria2 per-GID options
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  _request_id:
                    type: string
                  _schema:
                    type: string
                  error:
                    nullable: true
                    type: string
                  gid:
                    nullable: true
                    type: string
                  message:
                    nullable: true
                    type: string
                  ok:
                    nullable: true
                    type: boolean
                  options:
                    nullable: true
                    type: object
  /api/aria2/option_tiers:
    get:
      tags: [aria2]
      summary: Option tiers (managed/safe/unsafe)
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  _request_id:
                    type: string
                  _schema:
                    type: string
                  managed:
                    items:
                      type: string
                    type: array
                  safe:
                    items:
                      type: string
                    type: array
                  unsafe_enabled:
                    type: boolean
  /api/aria2/set_limits:
    post:
      tags: [aria2]
      summary: Set managed bandwidth and seed limits
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
  /api/bandwidth:
    get:
      tags: [Bandwidth]
      summary: Bandwidth status and probe data
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  _request_id:
                    type: string
                  _schema:
                    type: string
                  cap_bytes_per_sec:
                    nullable: true
                    type: integer
                  config:
                    type: object
                  current_limit:
                    nullable: true
                    type: object
                  down_cap_mbps:
                    nullable: true
                    type: number
                  downlink_mbps:
                    nullable: true
                    type: number
                  interface:
                    nullable: true
                    type: string
                  last_probe:
                    nullable: true
                    type: object
                  last_probe_at:
                    nullable: true
                    type: string
                  responsiveness_rpm:
                    nullable: true
                    type: number
                  up_cap_mbps:
                    nullable: true
                    type: number
                  uplink_mbps:
                    nullable: true
                    type: number
  /api/bandwidth/probe:
    post:
      tags: [Bandwidth]
      summary: Trigger manual bandwidth probe
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
  /api/declaration:
    get:
      tags: [Config]
      summary: UIC declaration (gates, preferences, policies)
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  _request_id:
                    type: string
                  _schema:
                    type: string
                  bandwidth:
                    nullable: true
                    type: object
                  gates:
                    nullable: true
                    type: object
                  preferences:
                    nullable: true
                    type: object
                  updated_at:
                    nullable: true
                    type: string
                  version:
                    nullable: true
                    type: integer
    post:
      tags: [Config]
      summary: Save UIC declaration
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
  /api/declaration/preferences:
    patch:
      tags: [Config]
      summary: Atomic partial preference update
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
  /api/docs:
    get:
      tags: [Meta]
      summary: Swagger UI
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
  /api/downloads/add:
    post:
      tags: [Queue]
      summary: Add URLs to download queue
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
  /api/downloads/archive:
    get:
      tags: [Queue]
      summary: Archived (removed/completed) downloads
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  _request_id:
                    type: string
                  _schema:
                    type: string
                  items:
                    items:
                      type: object
                    type: array
  /api/downloads/cleanup:
    post:
      tags: [Queue]
      summary: Archive stale completed/error downloads
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
  /api/downloads/{id}/files:
    get:
      tags: [Queue]
      summary: File list for torrent/metalink download
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  _request_id:
                    type: string
                  _schema:
                    type: string
                  error:
                    nullable: true
                    type: string
                  files:
                    items:
                      type: object
                    nullable: true
                    type: array
                  gid:
                    nullable: true
                    type: string
                  item_id:
                    nullable: true
                    type: string
                  message:
                    nullable: true
                    type: string
                  ok:
                    type: boolean
        "404":
          description: Not found
    post:
      tags: [Queue]
      summary: Select torrent/metalink files for download
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
        "404":
          description: Not found
  /api/downloads/{id}/pause:
    post:
      tags: [Queue]
      summary: Per-download action (pause/resume/remove/retry/priority)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
        "404":
          description: Not found
  /api/downloads/{id}/priority:
    post:
      tags: [Queue]
      summary: Per-download action (pause/resume/remove/retry/priority)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
        "404":
          description: Not found
  /api/downloads/{id}/remove:
    post:
      tags: [Queue]
      summary: Per-download action (pause/resume/remove/retry/priority)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
        "404":
          description: Not found
  /api/downloads/{id}/resume:
    post:
      tags: [Queue]
      summary: Per-download action (pause/resume/remove/retry/priority)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
        "404":
          description: Not found
  /api/downloads/{id}/retry:
    post:
      tags: [Queue]
      summary: Per-download action (pause/resume/remove/retry/priority)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
        "404":
          description: Not found
  /api/events:
    get:
      tags: [Observability]
      summary: SSE event stream (real-time state changes)
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
  /api/health:
    get:
      tags: [Observability]
      summary: Health check
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  _request_id:
                    type: string
                  _schema:
                    type: string
                  bytes_received_total:
                    type: integer
                  bytes_sent_total:
                    type: integer
                  disk_ok:
                    type: boolean
                  disk_usage_percent:
                    type: number
                  errors_total:
                    type: integer
                  requests_total:
                    type: integer
                  sse_clients:
                    type: integer
                  started_at:
                    type: string
                  status:
                    type: string
                  uptime_seconds:
                    type: number
                  version:
                    type: string
  /api/lifecycle:
    get:
      tags: [Lifecycle]
      summary: Install and service status
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  _request_id:
                    type: string
                  _schema:
                    type: string
                  aria2:
                    nullable: true
                    type: object
                  ariaflow:
                    nullable: true
                    type: object
                  homebrew:
                    nullable: true
                    type: object
                  launchd:
                    nullable: true
                    type: object
                  session_closed_at:
                    nullable: true
                    type: string
                  session_closed_reason:
                    nullable: true
                    type: string
                  session_id:
                    nullable: true
                    type: string
                  session_last_seen_at:
                    nullable: true
                    type: string
                  session_started_at:
                    nullable: true
                    type: string
  /api/lifecycle/{target}/{action}:
    post:
      tags: [Lifecycle]
      summary: Install or uninstall a component (macOS)
      parameters:
        - name: target
          in: path
          required: true
          schema:
            type: string
        - name: action
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
  /api/log:
    get:
      tags: [Observability]
      summary: Action log entries
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  _request_id:
                    type: string
                  _schema:
                    type: string
                  items:
                    items:
                      type: object
                    type: array
  /api/openapi.yaml:
    get:
      tags: [Meta]
      summary: OpenAPI specification (YAML)
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
  /api/peers:
    get:
      tags: [Meta]
      summary: GET peers peers
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  _request_id:
                    type: string
                  _schema:
                    type: string
                  peers:
                    items:
                      type: object
                    type: array
  /api/scheduler:
    get:
      tags: [Scheduler]
      summary: Scheduler status
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  _request_id:
                    type: string
                  _rev:
                    type: integer
                  _schema:
                    type: string
                  paused:
                    type: boolean
                  running:
                    type: boolean
                  session_closed_at:
                    nullable: true
                    type: string
                  session_id:
                    nullable: true
                    type: string
                  session_started_at:
                    nullable: true
                    type: string
                  status:
                    type: string
  /api/scheduler/pause:
    post:
      tags: [Scheduler]
      summary: Pause all active transfers
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
  /api/scheduler/preflight:
    post:
      tags: [Scheduler]
      summary: Run preflight checks
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
  /api/scheduler/resume:
    post:
      tags: [Scheduler]
      summary: Resume all paused transfers
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
  /api/scheduler/ucc:
    post:
      tags: [Scheduler]
      summary: Execute UCC cycle
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
  /api/sessions:
    get:
      tags: [Sessions]
      summary: Session history
      responses:
        "200":
