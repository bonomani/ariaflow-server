          content:
            application/json:
              schema:
                type: object
                properties:
                  _request_id:
                    type: string
                  _schema:
                    type: string
                  error:
                    nullable: true
                    type: string
                  message:
                    nullable: true
                    type: string
                  ok:
                    type: boolean
                  returncode:
                    nullable: true
                    type: integer
                  stderr:
                    nullable: true
                    type: string
                  stdout:
                    nullable: true
                    type: string
  /api/torrents:
    get:
      tags: [Torrents]
      summary: List seeded torrents
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  _request_id:
                    type: string
                  _schema:
                    type: string
                  count:
                    type: integer
                  torrents:
                    items:
                      type: object
                    type: array
  /api/torrents/{infohash}.torrent:
    get:
      tags: [Torrents]
      summary: Download .torrent file
      parameters:
        - name: infohash
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  _request_id:
                    type: string
                  _schema:
                    type: string
                  error:
                    nullable: true
                    type: string
                  message:
                    nullable: true
                    type: string
        "404":
          description: Not found
  /api/torrents/{infohash}/stop:
    post:
      tags: [Torrents]
      summary: Stop seeding a torrent
      parameters:
        - name: infohash
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad request
        "404":
          description: Not found

components:
  parameters:
    ItemId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Queue item UUID

  schemas:
    QueueItem:
      type: object
      properties:
        id:
          type: string
          description: UUID
        url:
          type: string
        status:
          type: string
          enum: [pending, queued, downloading, paused, complete, done, error, failed, removed, stopped, skipped]
        gid:
          type: string
          nullable: true
          description: aria2 GID
        session_id:
          type: string
          nullable: true
        error_code:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true
        live_status:
          type: string
          nullable: true
          description: aria2 live status (active, waiting, paused, etc.)
        downloadSpeed:
          type: string
          nullable: true
        completedLength:
          type: string
          nullable: true
        totalLength:
          type: string
          nullable: true

    EngineState:
      type: object
      properties:
        running:
          type: boolean
        paused:
          type: boolean
        active_gid:
          type: string
          nullable: true
        active_url:
          type: string
          nullable: true
        session_id:
          type: string
          nullable: true
        session_started_at:
          type: string
          nullable: true
        session_last_seen_at:
          type: string
          nullable: true
        session_closed_at:
          type: string
          nullable: true
        session_closed_reason:
          type: string
          nullable: true

    QueueSummary:
      type: object
      properties:
        total:
          type: integer
        queued:
          type: integer
        downloading:
          type: integer
        paused:
          type: integer
        done:
          type: integer
        error:
          type: integer

    Declaration:
      type: object
      properties:
        meta:
          type: object
          properties:
            contract:
              type: string
              example: UCC
            version:
              type: string
              example: "2.0"
        uic:
          type: object
          properties:
            gates:
              type: array
              items:
                type: object
            preferences:
              type: array
              items:
                type: object
            policies:
              type: array
              items:
                type: object
        targets:
          type: array
          items:
            type: object

    Error:
      type: object
      properties:
        ok:
          type: boolean
          example: false
        error:
          type: string
        message:
          type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Item not found
      content:
