name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: |
          python -m pip install --upgrade pip
          python -m unittest discover -s tests -v

      - name: Build source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - name: Rename release artifact
        run: |
          mkdir -p release
          cp dist/*.tar.gz release/ariaflow-${GITHUB_REF_NAME}.tar.gz

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          prerelease: false

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: bonomani/homebrew-ariaflow
          token: ${{ secrets.ARIAFLOW_TAP_TOKEN }}
          path: tap

      - name: Update tap formula
        run: |
          python3 scripts/homebrew_formula.py --tag "${GITHUB_REF_NAME}" --output tap/Formula/ariaflow.rb

      - name: Commit tap update
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ariaflow.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date"
            exit 0
          fi
          git commit -m "Update ariaflow formula to ${GITHUB_REF_NAME#v}"
          git push

      - name: Verify tap version
        run: |
          expected="${GITHUB_REF_NAME#v}"
          current=$(python3 - <<'PY'
from pathlib import Path
import re

text = Path("tap/Formula/ariaflow.rb").read_text(encoding="utf-8")
match = re.search(r'^  version "([^"]+)"$', text, re.MULTILINE)
print(match.group(1) if match else "")
PY
          )
          test "$current" = "$expected"
