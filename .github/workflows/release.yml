name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  update-tap:
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: read

    steps:
      - name: Compute sha256 and update homebrew-ariaflow formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          URL="https://github.com/bonomani/ariaflow/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -sL "$URL" | sha256sum | awk '{print $1}')

          FORMULA=$(cat <<FORMULA
          class Ariaflow < Formula
            desc "Sequential aria2 queue driver with adaptive bandwidth control"
            homepage "https://github.com/bonomani/ariaflow"
            url "${URL}"
            sha256 "${SHA256}"
            version "${VERSION}"
            license "MIT"
            head "https://github.com/bonomani/ariaflow.git", branch: "master"

            depends_on "python@3.12"

            def install
              libexec.install "src"

              (bin/"ariaflow").write <<~EOS
                #!/bin/bash
                export PYTHONPATH="\#{libexec}/src:\${PYTHONPATH}"
                exec "\#{Formula["python@3.12"].opt_bin}/python3" -m aria_queue "\$@"
              EOS
              chmod 0755, bin/"ariaflow"
            end

            test do
              system bin/"ariaflow", "--help"
            end
          end
          FORMULA
          )

          ENCODED=$(echo "$FORMULA" | base64 -w 0)
          FILE_SHA=$(curl -s -H "Authorization: token $TAP_TOKEN" \
            "https://api.github.com/repos/bonomani/homebrew-ariaflow/contents/Formula/ariaflow.rb" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")

          curl -s -X PUT \
            -H "Authorization: token $TAP_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/bonomani/homebrew-ariaflow/contents/Formula/ariaflow.rb" \
            -d "{\"message\":\"Update ariaflow formula to ${VERSION}\",\"content\":\"${ENCODED}\",\"sha\":\"${FILE_SHA}\"}"
